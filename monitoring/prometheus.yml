global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'nginx'
    static_configs:
      - targets: ['nginx:80']
    metrics_path: '/metrics'

  - job_name: 'node-apps'
    static_configs:
      - targets: ['app1:3000', 'app2:3000']
    metrics_path: '/metrics'
    scrape_interval: 5s