version: '3.8'

services:
  # Load Balancer (Nginx)
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - app1
      - app2
    networks:
      - app-network

  # Application instances for load balancing
  app1:
    build: ./app
    environment:
      - NODE_ENV=production
      - PORT=3000
      - INSTANCE_ID=app1
    networks:
      - app-network

  app2:
    build: ./app
    environment:
      - NODE_ENV=production
      - PORT=3000
      - INSTANCE_ID=app2
    networks:
      - app-network

  # Monitoring - Prometheus
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - app-network

  # Monitoring - Grafana
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin123
    networks:
      - app-network

networks:
  app-network:
    driver: bridge